<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Låtregister</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#2a1f14;--ink2:#5c4a34;--ink3:#9c876a;
  --paper:#faf7f2;--paper2:#f2ede4;--paper3:#e8e0d3;
  --accent:#7a3b1e;--accent2:#b05a2f;
  --border:rgba(90,60,30,0.15);--border2:rgba(90,60,30,0.28);
  --hi:#f0e8d8;
  --green:#2e5c2e;--green-bg:#e8f3e8;
  --pur-bg:#ede8f5;--pur:#42287a;--pur-bd:#c5b4e8;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Source Sans 3',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;}
header{background:var(--ink);color:var(--paper);padding:1rem 1.75rem;display:flex;align-items:baseline;gap:1rem;border-bottom:3px solid var(--accent);flex-shrink:0;}
header h1{font-family:'Libre Baskerville',serif;font-size:1.45rem;font-weight:700;color:var(--paper);}
header span{font-size:0.82rem;color:var(--ink3);font-style:italic;}
.tabs{display:flex;background:var(--paper2);border-bottom:1px solid var(--border2);padding:0 1.75rem;flex-shrink:0;}
.tab{padding:0.65rem 1.25rem;font-size:0.78rem;font-weight:600;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;letter-spacing:0.06em;text-transform:uppercase;transition:all .12s;}
.tab:hover{color:var(--ink);background:var(--paper3);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--paper);}
.tabpanel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tabpanel.active{display:flex;}

/* toolbar */
.toolbar{display:flex;gap:.6rem;padding:.7rem 1.75rem;background:var(--paper);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0;}
.toolbar input[type=text]{font-family:'Source Sans 3',sans-serif;font-size:.88rem;padding:.38rem .72rem;border:1px solid var(--border2);border-radius:4px;background:var(--paper);color:var(--ink);flex:1;min-width:150px;outline:none;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent2);}
.toolbar select{font-family:'Source Sans 3',sans-serif;font-size:.82rem;padding:.38rem .6rem;border:1px solid var(--border2);border-radius:4px;background:var(--paper);color:var(--ink);cursor:pointer;outline:none;}
.count{font-size:.78rem;color:var(--ink3);margin-left:auto;font-style:italic;}
.btn{font-family:'Source Sans 3',sans-serif;font-size:.78rem;font-weight:600;padding:.38rem .85rem;border:1px solid var(--border2);border-radius:4px;background:var(--paper2);color:var(--ink2);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .12s;}
.btn:hover{background:var(--paper3);color:var(--ink);}
.btn.primary{background:var(--accent);color:var(--paper);border-color:var(--accent);}
.btn.primary:hover{background:var(--accent2);}

/* lat table */
.lat-scroll{overflow-y:auto;flex:1;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
thead th{font-family:'Source Sans 3',sans-serif;font-weight:600;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);padding:.42rem .68rem;text-align:left;border-bottom:1px solid var(--border2);background:var(--paper2);position:sticky;top:0;z-index:2;}
thead th.sortable{cursor:pointer;user-select:none;}
thead th.sortable:hover{color:var(--ink);}
thead th.sorted{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);transition:background .07s;}
tbody tr:hover{background:var(--hi);}
tbody td{padding:.42rem .68rem;vertical-align:middle;}
td.navn{font-family:'Libre Baskerville',serif;font-size:.88rem;}
.type-badge{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 6px;border-radius:3px;letter-spacing:.04em;background:var(--paper3);color:var(--ink2);border:1px solid var(--border);white-space:nowrap;}
.kilde-text{font-size:.79rem;color:var(--ink2);font-style:italic;}

.saml-tag{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;padding:2px 5px;border-radius:3px;background:var(--pur-bg);color:var(--pur);border:1px solid var(--pur-bd);margin:1px;white-space:nowrap;}
.stag-rm{cursor:pointer;opacity:.45;font-size:.7rem;line-height:1;}
.stag-rm:hover{opacity:1;}
.saml-inline-select{font-family:'Source Sans 3',sans-serif;font-size:.7rem;padding:1px 4px;border:1px dashed var(--pur-bd);border-radius:3px;background:var(--paper);color:var(--pur);cursor:pointer;outline:none;margin:1px;}
.saml-inline-select:focus{border-color:var(--pur);}
.edit-btn{font-size:.7rem;padding:2px 6px;border:1px solid var(--border2);border-radius:3px;background:none;color:var(--ink3);cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all .1s;white-space:nowrap;}
.edit-btn:hover{color:var(--accent);border-color:var(--accent2);}
.noter-cell{display:flex;align-items:center;gap:.35rem;}
.noter-link{font-size:.79rem;color:var(--accent2);text-decoration:none;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.noter-link:hover{text-decoration:underline;}
.noter-input{font-family:'Source Sans 3',sans-serif;font-size:.79rem;padding:2px 6px;border:1px solid var(--accent2);border-radius:3px;background:var(--paper);color:var(--ink);flex:1;min-width:120px;outline:none;}
.drop-target{display:inline-flex;align-items:center;justify-content:center;width:24px;height:20px;border:1px dashed var(--border2);border-radius:3px;cursor:pointer;font-size:10px;color:var(--ink3);transition:all .12s;flex-shrink:0;}
.drop-target:hover,.drop-target.over{border-color:var(--accent2);background:var(--hi);color:var(--accent);}
.save-btn{font-size:.7rem;padding:2px 5px;border:1px solid var(--green);border-radius:3px;background:var(--green-bg);color:var(--green);cursor:pointer;font-family:'Source Sans 3',sans-serif;}
.cancel-btn{font-size:.7rem;padding:2px 5px;border:1px solid var(--border2);border-radius:3px;background:none;color:var(--ink3);cursor:pointer;font-family:'Source Sans 3',sans-serif;}
.empty{padding:2.5rem;text-align:center;color:var(--ink3);font-style:italic;}
.inst-tag{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;padding:2px 6px;border-radius:3px;background:#e8f0e8;color:#2a4a2a;border:1px solid #b8d0b8;margin:1px;white-space:nowrap;}
.itag-rm{cursor:pointer;opacity:.45;font-size:.7rem;line-height:1;}
.itag-rm:hover{opacity:1;}
.inst-inline-select{font-family:'Source Sans 3',sans-serif;font-size:.7rem;padding:1px 4px;border:1px dashed #b8d0b8;border-radius:3px;background:var(--paper);color:#2a4a2a;cursor:pointer;outline:none;margin:1px;}
.inst-inline-select:focus{border-color:#2a4a2a;}
.inst-tag .rm{cursor:pointer;opacity:.5;font-size:.8rem;line-height:1;margin-left:1px;}
.inst-tag .rm:hover{opacity:1;}
.inst-opt{font-size:.75rem;padding:2px 8px;border-radius:3px;border:1px solid var(--border2);background:var(--paper2);color:var(--ink2);cursor:pointer;transition:all .1s;margin:2px;}
.inst-opt:hover{background:var(--paper3);}
.inst-opt.selected{background:#2a4a2a;color:#e8f0e8;border-color:#2a4a2a;}
.inst-add-row{display:flex;gap:.35rem;margin-top:.5rem;}
.inst-add-row input{font-family:'Source Sans 3',sans-serif;font-size:.8rem;padding:3px 7px;border:1px solid var(--border2);border-radius:3px;background:var(--paper);color:var(--ink);flex:1;outline:none;}
.inst-add-row input:focus{border-color:var(--accent2);}
.inst-add-row button{font-size:.75rem;padding:3px 8px;border:1px solid var(--border2);border-radius:3px;background:var(--paper2);color:var(--ink2);cursor:pointer;font-family:'Source Sans 3',sans-serif;}
.inst-add-row button:hover{background:var(--paper3);}

/* split pane */
.split{display:flex;flex:1;overflow:hidden;}
.saml-list{width:250px;min-width:160px;border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;background:var(--paper2);}
.saml-list-toolbar{padding:.6rem .85rem;border-bottom:1px solid var(--border);display:flex;gap:.4rem;align-items:center;}
.saml-list-toolbar input{font-family:'Source Sans 3',sans-serif;font-size:.82rem;padding:.32rem .55rem;border:1px solid var(--border2);border-radius:4px;background:var(--paper);color:var(--ink);flex:1;outline:none;}
.saml-list-toolbar input:focus{border-color:var(--accent2);}
.saml-items{overflow-y:auto;flex:1;}
.saml-item{padding:.58rem .85rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .08s;}
.saml-item:hover{background:var(--hi);}
.saml-item.active{background:var(--accent);color:var(--paper);}
.saml-item.active .si-navn{color:var(--paper);}
.saml-item.active .si-meta{color:rgba(255,255,255,.6);}
.si-navn{font-family:'Libre Baskerville',serif;font-size:.86rem;}
.si-meta{font-size:.72rem;color:var(--ink3);margin-top:2px;}
.saml-add-btn{padding:.58rem .85rem;border-top:1px solid var(--border2);font-size:.75rem;font-weight:600;color:var(--accent);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;background:var(--paper2);transition:background .1s;flex-shrink:0;}
.saml-add-btn:hover{background:var(--paper3);}

.saml-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--paper);}
.saml-detail-header{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);background:var(--paper2);display:flex;align-items:baseline;gap:.85rem;flex-shrink:0;}
.saml-detail-header h2{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;}
.saml-detail-header .meta{font-size:.8rem;color:var(--ink3);font-style:italic;}
.saml-detail-header .spacer{flex:1;}
.saml-detail-body{flex:1;overflow-y:auto;padding:1.1rem 1.4rem;}
.saml-empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink3);font-style:italic;}
.sec-title{font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:.65rem;}
.lat-in-saml{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid var(--border);}
.lat-in-saml:last-child{border-bottom:none;}
.li-navn{font-family:'Libre Baskerville',serif;font-size:.86rem;flex:1;}
.li-type{font-size:.68rem;color:var(--ink3);}
.remove-btn{font-size:.68rem;padding:1px 6px;border:1px solid var(--border2);border-radius:3px;background:none;color:var(--ink3);cursor:pointer;font-family:'Source Sans 3',sans-serif;opacity:.6;transition:all .1s;}
.remove-btn:hover{opacity:1;color:var(--accent);border-color:var(--accent2);}
.add-lat-area{margin-top:1.3rem;}
.add-lat-search{font-family:'Source Sans 3',sans-serif;font-size:.84rem;padding:.38rem .65rem;border:1px solid var(--border2);border-radius:4px;background:var(--paper);color:var(--ink);width:100%;outline:none;margin-bottom:.45rem;}
.add-lat-search:focus{border-color:var(--accent2);}
.add-lat-results{max-height:175px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;background:var(--paper);}
.alr{padding:.38rem .65rem;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:.45rem;border-bottom:1px solid var(--border);}
.alr:last-child{border-bottom:none;}
.alr:hover{background:var(--hi);}
.alr-create{border-top:1px dashed var(--border2);}
.alr-in{opacity:.55;cursor:default;}
.alr-type{font-size:.68rem;color:var(--ink3);}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(30,18,8,.52);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--paper);border-radius:6px;border:1px solid var(--border2);width:430px;max-width:95vw;padding:1.4rem;}
.modal h2{font-family:'Libre Baskerville',serif;font-size:1.05rem;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.6rem;}
.form-row{margin-bottom:.8rem;}
.form-row label{display:block;font-size:.72rem;font-weight:600;color:var(--ink3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.28rem;}
.form-row input,.form-row select{width:100%;font-family:'Source Sans 3',sans-serif;font-size:.88rem;padding:.42rem .68rem;border:1px solid var(--border2);border-radius:4px;background:var(--paper);color:var(--ink);outline:none;}
.form-row input:focus,.form-row select:focus{border-color:var(--accent2);}
.modal-drop{border:2px dashed var(--border2);border-radius:5px;padding:.65rem 1rem;text-align:center;font-size:.78rem;color:var(--ink3);cursor:pointer;transition:all .12s;margin-top:.35rem;}
.modal-drop:hover,.modal-drop.over{border-color:var(--accent2);background:var(--hi);color:var(--accent);}
.modal-drop.has-file{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.modal-actions{display:flex;justify-content:flex-end;gap:.45rem;margin-top:1.1rem;padding-top:.8rem;border-top:1px solid var(--border);}
.status-bar{position:fixed;bottom:0;left:0;right:0;padding:.32rem 2rem;background:var(--green-bg);border-top:1px solid #b8dab8;color:var(--green);font-size:.76rem;font-weight:600;text-align:center;transform:translateY(100%);transition:transform .18s;z-index:50;}
.status-bar.show{transform:translateY(0);}

.lat-navn-link{cursor:pointer;color:var(--ink);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .1s;}
.lat-navn-link:hover{border-bottom-color:var(--accent2);color:var(--accent);}
.notat-row{display:flex;align-items:flex-start;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--border);}
.notat-row:last-child{border-bottom:none;}
.notat-tittel{font-size:.88rem;font-weight:600;color:var(--ink);margin-bottom:2px;}
.notat-sti{font-size:.78rem;color:var(--accent2);cursor:pointer;text-decoration:none;}
.notat-sti:hover{text-decoration:underline;}
.notat-komm{font-size:.76rem;color:var(--ink3);font-style:italic;margin-top:2px;}
</style>
</head>
<body>

<header>
  <h1>Låtregister</h1>
  <span id="header-subtitle">laster…</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('latar')">Låtar</div>
  <div class="tab" onclick="showTab('samlingar')">Samlingar</div>
</div>

<!-- LÅTAR -->
<div id="tab-latar" class="tabpanel active">
  <div class="toolbar">
    <input type="text" id="search-lat" placeholder="Søk i låtar…" oninput="renderLatar()">
    <select id="filter-type" onchange="renderLatar()"><option value="">Alle typar</option></select>
    <select id="filter-saml" onchange="renderLatar()"><option value="">Alle samlinger</option></select>
    <button class="btn primary" onclick="openNyLatModal()">+ Ny låt</button>
    <span class="count" id="lat-count"></span>
  </div>
  <div class="lat-scroll">
    <table>
      <thead><tr>
        <th class="sortable" onclick="sortLatar('namn')" id="th-namn">Namn</th>
        <th class="sortable" onclick="sortLatar('type')" id="th-type">Type</th>
        <th>Kjelde</th>
        <th>Samlingar</th>
        <th>Instrument</th>
        <th style="min-width:175px;">Notar</th>
        <th></th>
      </tr></thead>
      <tbody id="lat-tbody"></tbody>
    </table>
    <div id="lat-empty" class="empty" style="display:none;">Ingen låtar funne.</div>
  </div>
</div>

<!-- SAMLINGAR -->
<div id="tab-samlingar" class="tabpanel">
  <div class="split">
    <div class="saml-list">
      <div class="saml-list-toolbar">
        <input type="text" id="search-saml" placeholder="Søk…" oninput="renderSamlList()">
      </div>
      <div class="saml-items" id="saml-items"></div>
      <div class="saml-add-btn" onclick="openNySamlModal()">+ Ny samling</div>
    </div>
    <div class="saml-detail" id="saml-detail">
      <div class="saml-empty-state">Vel ei samling</div>
    </div>
  </div>
</div>

<!-- Modal: låt -->
<div class="modal-bg" id="modal-lat">
  <div class="modal">
    <h2 id="modal-lat-title">Ny låt</h2>
    <div class="form-row"><label>Namn</label><input type="text" id="ml-namn" placeholder="Låtnamn"></div>
    <div class="form-row"><label>Type</label><select id="ml-type"><option value="">— vel type —</option></select></div>
    <div class="form-row"><label>Kjelde</label><input type="text" id="ml-kilde" placeholder="Kjelde / spelemenn"></div>
    <div class="form-row">
      <label>Instrument</label>
      <div id="ml-inst-tags" style="display:flex;flex-wrap:wrap;gap:3px;min-height:22px;margin-bottom:.4rem;"></div>
      <div id="ml-inst-opts" style="display:flex;flex-wrap:wrap;"></div>
      <div class="inst-add-row">
        <input type="text" id="ml-inst-new" placeholder="Legg til instrument…" onkeydown="if(event.key==='Enter'){event.preventDefault();addInstOption();}">
        <button onclick="addInstOption()">+ Legg til</button>
      </div>
    </div>
    <div class="form-row">
      <label>Notar (PDF)</label>
      <div style="display:flex;gap:.4rem;"><input type="text" id="ml-noter" placeholder="Filsti…" style="flex:1;"><button class="btn" onclick="pickPDFForModal()" style="flex-shrink:0;white-space:nowrap;">Velg fil…</button></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-lat')">Avbryt</button>
      <button class="btn primary" onclick="saveLatModal()">Lagre</button>
    </div>
  </div>
</div>

<!-- Modal: samling -->
<div class="modal-bg" id="modal-saml">
  <div class="modal">
    <h2 id="modal-saml-title">Ny samling</h2>
    <div class="form-row"><label>Namn</label><input type="text" id="ms-namn" placeholder="Samlingsnamn"></div>
    <div class="form-row"><label>Type</label><input type="text" id="ms-type" placeholder="t.d. Album, Hefte…"></div>
    <div class="form-row"><label>År</label><input type="text" id="ms-year" placeholder="t.d. 2024"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-saml')">Avbryt</button>
      <button class="btn primary" onclick="saveSamlModal()">Lagre</button>
    </div>
  </div>
</div>


<!-- Modal: låtside -->
<div class="modal-bg" id="modal-latside" onclick="closeLatsideIfBg(event)">
  <div id="latside-panel" style="background:var(--paper);border-radius:8px;border:1px solid var(--border2);width:92vw;max-width:1300px;height:88vh;display:flex;flex-direction:column;overflow:hidden;resize:both;">
    <!-- header -->
    <div style="display:flex;align-items:center;gap:.75rem;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--paper2);">
      <h2 id="mls-tittel" style="font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;flex:1;margin:0;"></h2>
      <span id="mls-type" class="type-badge"></span>
      <button class="btn" onclick="closeModal('modal-latside')">Lukk</button>
    </div>
    <!-- body: left metadata + right PDF -->
    <div style="display:flex;flex:1;overflow:hidden;">
      <!-- left column -->
      <div style="width:320px;min-width:220px;flex-shrink:0;overflow-y:auto;padding:1rem 1.1rem;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1rem;">
        <div>
          <div class="sec-title" style="margin-bottom:.3rem;">Kilde</div>
          <div id="mls-kilde" style="font-size:.86rem;font-style:italic;color:var(--ink2);"></div>
        </div>
        <div>
          <div class="sec-title" style="margin-bottom:.3rem;">Instrument</div>
          <div id="mls-inst" style="font-size:.86rem;"></div>
        </div>
        <div>
          <div class="sec-title" style="margin-bottom:.3rem;">Samlinger</div>
          <div id="mls-samlingar"></div>
        </div>
        <div style="flex:1;">
          <div class="sec-title" style="margin-bottom:.5rem;">Noter</div>
          <div id="mls-noter-list" style="margin-bottom:.75rem;"></div>
          <div style="border:1px solid var(--border2);border-radius:5px;padding:.75rem;background:var(--paper2);">
            <div class="sec-title" style="margin-bottom:.45rem;">Legg til notat</div>
            <div class="form-row" style="margin-bottom:.4rem;"><label>Tittel</label><input type="text" id="mls-new-tittel" placeholder="t.d. Første sats…"></div>
            <div class="form-row" style="margin-bottom:.4rem;"><label>Filsti (PDF)</label>
              <div style="display:flex;gap:.35rem;">
                <input type="text" id="mls-new-sti" placeholder="/sti/til/fil.pdf" style="flex:1;">
                <button class="btn" onclick="pickPDFForNotat()" style="flex-shrink:0;white-space:nowrap;padding:.3rem .6rem;">Velg…</button>
              </div>
            </div>
            <div class="form-row" style="margin-bottom:.6rem;"><label>Kommentar</label><input type="text" id="mls-new-komm" placeholder="Valgfri merknad"></div>
            <button class="btn primary" style="width:100%;" onclick="addNotatToLat()">+ Legg til notat</button>
          </div>
        </div>
      </div>
      <!-- right: PDF viewer -->
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:#444;">
        <div id="pdf-toolbar" style="display:flex;align-items:center;gap:.5rem;padding:.4rem .75rem;background:#333;flex-shrink:0;">
          <span id="pdf-title" style="font-size:.78rem;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Ingen PDF valgt</span>

ngar","kilde":""},{"id":95,"navn":"Triolåter","type":"","kilde":""},{"id":96,"navn":"Tukthusen","type":"Springar","kilde":""},{"id":97,"navn":"Tveitlien","type":"Ulikeunderelt","kilde":""},{"id":98,"navn":"Tversover'n","type":"Ulikeunderelt","kilde":""},{"id":99,"navn":"Ufredsslåtten","type":"Ulikeunderelt","kilde":""},{"id":100,"navn":"Vals e Olav B Straume","type":"Vals","kilde":""},{"id":101,"navn":"Vals etter Åni Smeland","type":"Vals","kilde":""},{"id":102,"navn":"Vals etter Peder i Lia","type":"Vals","kilde":""},{"id":103,"navn":"Vårnaua","type":"Ulikeunderelt","kilde":""},{"id":104,"navn":"Venner og frender","type":"","kilde":""},{"id":105,"navn":"Vetl-Imbert","type":"Springar","kilde":""},{"id":106,"navn":"Vierlivalsen","type":"","kilde":""},{"id":107,"navn":"Vigstamoin","type":"Springar","kilde":""},{"id":108,"navn":"Visa från Malung","type":"","kilde":""},{"id":109,"navn":"VossastRil","type":"","kilde":""}],"samlingar":[{"id":1,"navn":"Tellefs sjøfløyte","type":"","år":"2016"},{"id":2,"navn":"Den norske sekkepipa","type":"","år":"2015"},{"id":3,"navn":"North Sea Music","type":"","år":"1997"},{"id":4,"navn":"Slinkombas","type":"","år":"1982"},{"id":5,"navn":"..og bas igjen","type":"","år":"1979"},{"id":6,"navn":"Den norske sekkepipa II","type":"","år":""},{"id":7,"navn":"Reel Date","type":"","år":""},{"id":8,"navn":"Upstairs in a Tent","type":"","år":""}],"koblingar":[{"latId":2,"samlId":4},{"latId":35,"samlId":8}],"nextLatId":110,"nextSamlId":9,"latTyper":["Likeunderdelt","Marsj","Pols","Polska","Reinlender","Ril","Springar","Tone","Ulikeunderelt","Vals","Visetone"],"instTyper":["Fele","Sekkepipe","Sjøfløyte"]};

// Electron: data stored as JSON files via IPC
let data={}, noter={}, noter2={}, latSort={field:'namn',asc:true}; // noter2: {latId:[{tittel,sti,kommentar}]}
let editingNoterId=null, activeSamlId=null, editingLatId=null, editingSamlId=null;

async function load(){
  const api = window.electronAPI;
  if(!api){ data=JSON.parse(JSON.stringify(DEFAULT_DATA)); noter={}; noter2={}; }
  else {
    try{ const saved=await api.loadData(); data=saved||JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    catch(e){ data=JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    try{ noter=await api.loadNoter()||{}; }catch(e){ noter={}; }
    try{ noter2=await api.loadNoter2()||{}; }catch(e){ noter2={}; }
  }
  ['latar','samlingar','koblingar'].forEach(k=>{if(!data[k])data[k]=[];});
  if(!data.nextLatId)data.nextLatId=110;
  if(!data.nextSamlId)data.nextSamlId=9;
  if(!data.instTyper)data.instTyper=['Fele','Sekkepipe','Sjøfløyte'];
  data.latar.forEach(l=>{if(!l.instrument)l.instrument=[];});
}
function save(){
  if(window.electronAPI){
    window.electronAPI.saveData(data);
    window.electronAPI.saveNoter(noter);
    window.electronAPI.saveNoter2(noter2);
  }
  showStatus('Lagra');
}
function showStatus(m){const b=document.getElementById('status-bar');b.textContent=m;b.classList.add('show');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('show'),1800);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function showTab(tab){
  document.querySelectorAll('.tabpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='latar')||(i===1&&tab==='samlingar')));
  if(tab==='samlingar'){renderSamlList();if(activeSamlId)renderSamlDetail(activeSamlId);}
}

function buildFilters(){
  const ts=document.getElementById('filter-type'),ss=document.getElementById('filter-saml'),mt=document.getElementById('ml-type');
  const types=[...new Set(data.latar.map(l=>l.type).filter(Boolean))].sort();
  [ts,mt].forEach(sel=>{const f=sel.options[0];sel.innerHTML='';sel.appendChild(f);types.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});});
  const fs=ss.options[0];ss.innerHTML='';ss.appendChild(fs);
  data.samlingar.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.navn;ss.appendChild(o);});
}

function getSamlForLat(id){return data.koblingar.filter(k=>k.latId===id).map(k=>data.samlingar.find(s=>s.id===k.samlId)).filter(Boolean);}



function renderInstCell(latId){
  const lat=data.latar.find(l=>l.id===latId);if(!lat)return '';
  const inst=lat.instrument||[];
  const available=data.instTyper.filter(i=>!inst.includes(i));
  let out=inst.map(i=>`<span class="inst-tag">${esc(i)}<span class="itag-rm" onclick="removeInstFromLat(${latId},'${esc(i)}')">✕</span></span>`).join('');
  if(available.length){
    out+=`<select class="inst-inline-select" onchange="addInstToLatInline(${latId},this)">
      <option value="">+ Instrument</option>
      ${available.map(i=>`<option value="${esc(i)}">${esc(i)}</option>`).join('')}
    </select>`;
  }
  return out;
}
function addInstToLatInline(latId,sel){
  const val=sel.value;if(!val)return;
  const lat=data.latar.find(l=>l.id===latId);if(!lat)return;
  if(!lat.instrument)lat.instrument=[];
  if(!lat.instrument.includes(val))lat.instrument.push(val);
  save();
  const c=document.getElementById('ic-'+latId);if(c)c.innerHTML=renderInstCell(latId);
}
function removeInstFromLat(latId,inst){
  const lat=data.latar.find(l=>l.id===latId);if(!lat)return;
  lat.instrument=(lat.instrument||[]).filter(i=>i!==inst);
  save();
  const c=document.getElementById('ic-'+latId);if(c)c.innerHTML=renderInstCell(latId);
}
function renderSamlCell(latId){
  const samlar=getSamlForLat(latId);
  const available=data.samlingar.filter(s=>!samlar.find(x=>x.id===s.id));
  let html=samlar.map(s=>`<span class="saml-tag">${esc(s.navn)}<span class="stag-rm" onclick="removeSamlFromLat(${latId},${s.id})">✕</span></span>`).join('');
  if(available.length){
    html+=`<select class="saml-inline-select" onchange="addSamlToLatInline(${latId},this)">
      <option value="">+ Samling</option>
      ${available.map(s=>`<option value="${s.id}">${esc(s.navn)}</option>`).join('')}
    </select>`;
  }
  return html;
}
function addSamlToLatInline(latId,sel){
  const samlId=parseInt(sel.value);if(!samlId)return;
  if(!data.koblingar.find(k=>k.latId===latId&&k.samlId===samlId))data.koblingar.push({latId,samlId});
  save();
  const c=document.getElementById('sc-'+latId);if(c)c.innerHTML=renderSamlCell(latId);
  renderSamlList();buildFilters();
}
function removeSamlFromLat(latId,samlId){
  data.koblingar=data.koblingar.filter(k=>!(k.latId===latId&&k.samlId===samlId));
  save();
  const c=document.getElementById('sc-'+latId);if(c)c.innerHTML=renderSamlCell(latId);
  renderSamlList();buildFilters();
}
function renderLatar(){
  const q=document.getElementById('search-lat').value.trim().toLowerCase();
  const ft=document.getElementById('filter-type').value;
  const fs=document.getElementById('filter-saml').value;
  let rows=data.latar.filter(l=>{
    if(q&&!l.navn.toLowerCase().includes(q)&&!(l.kilde||'').toLowerCase().includes(q))return false;
    if(ft&&l.type!==ft)return false;
    if(fs){const ids=data.koblingar.filter(k=>k.samlId===parseInt(fs)).map(k=>k.latId);if(!ids.includes(l.id))return false;}
    return true;
  });
  rows.sort((a,b)=>{const f=latSort.field,va=f==='namn'?a.navn:a.type,vb=f==='namn'?b.navn:b.type;return latSort.asc?va.localeCompare(vb,'no'):vb.localeCompare(va,'no');});
  document.getElementById('lat-count').textContent=rows.length+' av '+data.latar.length+' låtar';
  document.getElementById('lat-empty').style.display=rows.length===0?'':'none';
  const tbody=document.getElementById('lat-tbody');tbody.innerHTML='';
  rows.forEach(lat=>{
    const samlar=getSamlForLat(lat.id),sti=noter[lat.id]||'';
    const tr=document.createElement('tr');tr.dataset.id=lat.id;
    const instArr=lat.instrument||[];
    tr.innerHTML=`<td class="navn"><a class="lat-navn-link" onclick="openLatSide(${lat.id})">${esc(lat.navn)}</a></td>
    <td>${lat.type?`<span class="type-badge">${esc(lat.type)}</span>`:'<span style="color:var(--ink3);font-size:.76rem;">—</span>'}</td>
    <td><span class="kilde-text">${esc(lat.kilde)||''}</span></td>
    <td><div class="saml-cell" id="sc-${lat.id}">${renderSamlCell(lat.id)}</div></td>
    <td><div class="inst-cell" id="ic-${lat.id}">${renderInstCell(lat.id)}</div></td>
    <td><div class="noter-cell" id="nc-${lat.id}">${renderNoterCell(lat.id,sti)}</div></td>
    <td><button class="edit-btn" onclick="openEditLat(${lat.id})">Rediger</button></td>`;
    tbody.appendChild(tr);
  });
}

function renderNoterCell(id,sti){
  if(editingNoterId===id)return `<input class="noter-input" id="ni-${id}" type="text" value="${esc(sti)}" placeholder="Filsti…" onkeydown="if(event.key==='Enter')saveNoter(${id});if(event.key==='Escape')cancelNoter(${id})"><button class="save-btn" onclick="saveNoter(${id})">OK</button><button class="cancel-btn" onclick="cancelNoter(${id})">✕</button><div class="drop-target" id="dt-${id}" title="Slipp PDF" ondragover="dtOver(event,${id})" ondragleave="dtLeave(${id})" ondrop="dtDrop(event,${id})">↓</div>`;
  if(sti)return `<a class="noter-link" title="${esc(sti)}" onclick="openPDF(${id})">${esc(sti.split(/[/\\]/).pop()||sti)}</a><button class="edit-btn" onclick="startEdit(${id})">Endre</button>`;
  return `<button class="edit-btn" onclick="startEdit(${id})">+ Legg til</button>`;
}
function startEdit(id){editingNoterId=id;const c=document.getElementById('nc-'+id);if(c)c.innerHTML=renderNoterCell(id,noter[id]||'');setTimeout(()=>{const i=document.getElementById('ni-'+id);if(i)i.focus();},20);}
function saveNoter(id){const i=document.getElementById('ni-'+id);if(!i)return;const v=i.value.trim();if(v)noter[id]=v;else delete noter[id];editingNoterId=null;save();const c=document.getElementById('nc-'+id);if(c)c.innerHTML=renderNoterCell(id,noter[id]||'');}
function cancelNoter(id){editingNoterId=null;const c=document.getElementById('nc-'+id);if(c)c.innerHTML=renderNoterCell(id,noter[id]||'');}
function openPDF(id){
  const s=noter[id];if(!s)return;
  if(window.electronAPI) window.electronAPI.openPDF(s);
}

function dtOver(e,id){e.preventDefault();const d=document.getElementById('dt-'+id);if(d)d.classList.add('over');}
function dtLeave(id){const d=document.getElementById('dt-'+id);if(d)d.classList.remove('over');}
function dtDrop(e,id){
  e.preventDefault();dtLeave(id);
  const f=e.dataTransfer.files[0];if(!f)return;
  const p=f.path||f.name;
  const i=document.getElementById('ni-'+id);if(i){i.value=p;i.focus();}
}

function dropOver(e,z){e.preventDefault();document.getElementById(z).classList.add('over');}
function dropLeave(z){document.getElementById(z).classList.remove('over');}
function dropFileModal(e,inp,z){
  e.preventDefault();dropLeave(z);
  const f=e.dataTransfer.files[0];if(!f)return;
  const p=f.path||f.name;
  document.getElementById(inp).value=p;
  const zone=document.getElementById(z);
  zone.textContent=p.split(/[/\\]/).pop()||p;
  zone.classList.add('has-file');
}

function sortLatar(f){if(latSort.field===f)latSort.asc=!latSort.asc;else{latSort.field=f;latSort.asc=true;}document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sorted'));const el=document.getElementById('th-'+f);if(el)el.classList.add('sorted');renderLatar();}

/* samlingar */
function renderSamlList(){
  const q=document.getElementById('search-saml').value.trim().toLowerCase();
  const rows=data.samlingar.filter(s=>!q||s.navn.toLowerCase().includes(q));
  const c=document.getElementById('saml-items');c.innerHTML='';
  rows.forEach(s=>{
    const n=data.koblingar.filter(k=>k.samlId===s.id).length;
    const d=document.createElement('div');d.className='saml-item'+(activeSamlId===s.id?' active':'');
    d.innerHTML=`<div class="si-navn">${esc(s.navn)}</div><div class="si-meta">${[s.år,n+' låtar'].filter(Boolean).join(' · ')}</div>`;
    d.onclick=()=>{activeSamlId=s.id;renderSamlList();renderSamlDetail(s.id);};
    c.appendChild(d);
  });
}

function renderSamlDetail(samlId){
  const saml=data.samlingar.find(s=>s.id===samlId);if(!saml)return;
  const linked=data.koblingar.filter(k=>k.samlId===samlId).map(k=>data.latar.find(l=>l.id===k.latId)).filter(Boolean);
  const det=document.getElementById('saml-detail');
  det.innerHTML=`
    <div class="saml-detail-header">
      <h2>${esc(saml.navn)}</h2>
      <span class="meta">${[saml.type,saml.år].filter(Boolean).join(' · ')||''}</span>
      <span class="spacer"></span>
      <button class="btn" onclick="openEditSaml(${saml.id})">Rediger</button>
    </div>
    <div class="saml-detail-body">
      <div class="add-lat-area" style="margin-bottom:1.4rem;">
        <div class="sec-title">Legg til låt</div>
        <input class="add-lat-search" type="text" id="alq-${samlId}" placeholder="Søk eller skriv navn på ny låt…" oninput="renderALR(${samlId})" onkeydown="alrKeydown(event,${samlId})">
        <div class="add-lat-results" id="alr-${samlId}"></div>
      </div>
      <div class="sec-title">${linked.length} låter i denne samlingen</div>
      <div>
        ${linked.length===0
          ?'<div style="color:var(--ink3);font-style:italic;font-size:.84rem;padding:.4rem 0;">Ingen låter ennå</div>'
          :linked.map(l=>`<div class="lat-in-saml">
            <a class="lat-navn-link" onclick="openLatSide(${l.id})">${esc(l.navn)}</a>
            ${l.type?`<span class="li-type">${esc(l.type)}</span>`:''}
            <button class="remove-btn" onclick="removeLatFromSaml(${l.id},${samlId})">Fjern</button>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderALR(samlId){
  const q=((document.getElementById('alq-'+samlId)||{}).value||'').trim();
  const already=new Set(data.koblingar.filter(k=>k.samlId===samlId).map(k=>k.latId));
  const c=document.getElementById('alr-'+samlId);if(!c)return;
  if(!q){c.innerHTML='';return;}
  const ql=q.toLowerCase();
  // All matching latar, both already-in and not-in
  const m=data.latar.filter(l=>l.navn.toLowerCase().includes(ql)).slice(0,20);
  const exactMatch=data.latar.find(l=>l.navn.toLowerCase()===ql);
  let out=m.map(l=>{
    const inSaml=already.has(l.id);
    return `<div class="alr${inSaml?' alr-in':''}" ${inSaml?'':'onclick="addLatToSaml('+l.id+','+samlId+')"'}>
      <span style="flex:1;">${esc(l.navn)}</span>
      ${l.type?`<span class="alr-type">${esc(l.type)}</span>`:''}
      ${inSaml?'<span class="alr-type" style="color:var(--green);font-style:italic;">allerede i samlingen</span>':''}
    </div>`;
  }).join('');
  // Only show create option if no exact name match exists anywhere
  if(!exactMatch){
    out+=`<div class="alr alr-create" onclick="createAndAddLat('${esc(q).replace(/'/g,"\\'")}',${samlId})">
      <span style="flex:1;font-style:italic;">Opprett «${esc(q)}» og legg til</span>
      <span class="alr-type" style="color:var(--accent);">+ Ny låt</span>
    </div>`;
  }
  c.innerHTML=out;
}
function createAndAddLat(navn,samlId){
  const id=data.nextLatId++;
  data.latar.push({id,navn,type:'',kilde:'',instrument:[]});
  data.koblingar.push({latId:id,samlId});
  save();buildFilters();renderLatar();
  renderSamlDetail(samlId);renderSamlList();
  const inp=document.getElementById('alq-'+samlId);
  if(inp){inp.value='';document.getElementById('alr-'+samlId).innerHTML='';}
}
function alrKeydown(e,samlId){
  if(e.key!=='Enter')return;
  const q=((document.getElementById('alq-'+samlId)||{}).value||'').trim();
  if(!q)return;
  const already=new Set(data.koblingar.filter(k=>k.samlId===samlId).map(k=>k.latId));
  const ql=q.toLowerCase();
  const exact=data.latar.find(l=>l.navn.toLowerCase()===ql);
  if(exact){
    if(!already.has(exact.id))addLatToSaml(exact.id,samlId);
    // if already in saml, do nothing — it's shown as greyed out
    return;
  }
  const m=data.latar.filter(l=>!already.has(l.id)&&l.navn.toLowerCase().includes(ql));
  if(m.length===1)addLatToSaml(m[0].id,samlId);
  else createAndAddLat(q,samlId);
}

function addLatToSaml(latId,samlId){
  if(!data.koblingar.find(k=>k.latId===latId&&k.samlId===samlId))data.koblingar.push({latId,samlId});
  save();renderSamlDetail(samlId);renderSamlList();buildFilters();renderLatar();
}
function removeLatFromSaml(latId,samlId){
  data.koblingar=data.koblingar.filter(k=>!(k.latId===latId&&k.samlId===samlId));
  save();renderSamlDetail(samlId);renderSamlList();buildFilters();renderLatar();
}


/* instrument picker */
let modalInst=[];
function renderInstPicker(){
  const tags=document.getElementById('ml-inst-tags');
  const opts=document.getElementById('ml-inst-opts');
  if(!tags||!opts)return;
  tags.innerHTML=modalInst.map(i=>`<span class="inst-tag">${esc(i)}<span class="rm" onclick="removeModalInst('${esc(i)}')">✕</span></span>`).join('');
  opts.innerHTML=data.instTyper.map(i=>`<span class="inst-opt${modalInst.includes(i)?' selected':''}" onclick="toggleModalInst('${esc(i)}')">${esc(i)}</span>`).join('');
}
function toggleModalInst(i){
  if(modalInst.includes(i))modalInst=modalInst.filter(x=>x!==i);
  else modalInst.push(i);
  renderInstPicker();
}
function removeModalInst(i){modalInst=modalInst.filter(x=>x!==i);renderInstPicker();}
function addInstOption(){
  const inp=document.getElementById('ml-inst-new');
  const v=inp.value.trim();if(!v)return;
  if(!data.instTyper.includes(v))data.instTyper.push(v);
  if(!modalInst.includes(v))modalInst.push(v);
  inp.value='';save();renderInstPicker();
}

/* låtside modal */
let currentLatSideId=null;
let pdfList=[], pdfIndex=0;
function openLatSide(latId){
  currentLatSideId=latId;
  const lat=data.latar.find(l=>l.id===latId);if(!lat)return;
  document.getElementById('mls-tittel').textContent=lat.navn;
  const tb=document.getElementById('mls-type');
  tb.textContent=lat.type||'';tb.style.display=lat.type?'':'none';
  document.getElementById('mls-kilde').textContent=lat.kilde||'—';
  document.getElementById('mls-inst').textContent=(lat.instrument||[]).join(', ')||'—';
  const samlar=getSamlForLat(latId);
  document.getElementById('mls-samlingar').innerHTML=samlar.length
    ?samlar.map(s=>`<span class="saml-tag" style="margin:2px;">${esc(s.navn)}</span>`).join('')
    :'<span style="color:var(--ink3);font-style:italic;font-size:.84rem;">Ingen samlinger</span>';
  ['mls-new-tittel','mls-new-sti','mls-new-komm'].forEach(id=>document.getElementById(id).value='');
  renderNoterList(latId);
  buildPDFList(latId);
  document.getElementById('modal-latside').classList.add('open');
}
function closeLatsideIfBg(e){if(e.target.id==='modal-latside')closeModal('modal-latside');}
function buildPDFList(latId){
  pdfList=[];
  const legacy=noter[latId];
  if(legacy)pdfList.push({tittel:'Notat',sti:legacy});
  (noter2[latId]||[]).forEach(n=>{if(n.sti)pdfList.push({tittel:n.tittel||'Notat',sti:n.sti});});
  pdfIndex=0;
  showPDF();
}
function showPDF(){
  const viewer=document.getElementById('pdf-viewer');
  const title=document.getElementById('pdf-title');
  const idx=document.getElementById('pdf-index');
  if(!pdfList.length){
    viewer.src='about:blank';
    title.textContent='Ingen PDF valgt';
    idx.textContent='';
    return;
  }
  const n=pdfList[pdfIndex];
  viewer.src='file://'+n.sti;
  title.textContent=n.tittel+' — '+(n.sti.split(/[/\\]/).pop()||n.sti);
  idx.textContent=pdfList.length>1?(pdfIndex+1)+'/'+pdfList.length:'';
}
function jumpToPDF(noterIdx){
  // offset by 1 if legacy noter exists
  const offset=(noter[currentLatSideId])?1:0;
  pdfIndex=noterIdx+offset;
  showPDF();
}
function prevPDF(){if(pdfIndex>0){pdfIndex--;showPDF();}}
function nextPDF(){if(pdfIndex<pdfList.length-1){pdfIndex++;showPDF();}}
function renderNoterList(latId){
  const list=document.getElementById('mls-noter-list');if(!list)return;
  const notar=noter2[latId]||[];
  // Also show legacy single noter entry if present
  const legacy=noter[latId];
  let items=notar.map((n,i)=>`
    <div class="notat-row">
      <div style="flex:1;">
        <div class="notat-tittel">${esc(n.tittel)||'<span style="color:var(--ink3);font-style:italic;">Uten tittel</span>'}</div>
        ${n.sti?`<div class="notat-sti" onclick="openPDFSti('${esc(n.sti).replace(/'/g,"\'")}')">${esc(n.sti.split(/[/\\]/).pop()||n.sti)}</div>`:''}
        ${n.kommentar?`<div class="notat-komm">${esc(n.kommentar)}</div>`:''}
      </div>
      <button class="remove-btn" onclick="removeNotat(${latId},${i})">Fjern</button>
    </div>`).join('');
  if(legacy&&!notar.find(n=>n.sti===legacy)){
    items=`<div class="notat-row">
      <div style="flex:1;">
        <div class="notat-tittel" style="color:var(--ink3);font-style:italic;">Tidligere notat</div>
        <div class="notat-sti" onclick="openPDFSti('${esc(legacy).replace(/'/g,"\'")}') ">${esc(legacy.split(/[/\\]/).pop()||legacy)}</div>
      </div>
    </div>`+items;
  }
  list.innerHTML=items||'<div style="color:var(--ink3);font-style:italic;font-size:.84rem;margin-bottom:.5rem;">Ingen noter ennå</div>';
}
function addNotatToLat(){
  const latId=currentLatSideId;if(!latId)return;
  const tittel=document.getElementById('mls-new-tittel').value.trim();
  const sti=document.getElementById('mls-new-sti').value.trim();
  const kommentar=document.getElementById('mls-new-komm').value.trim();
  if(!tittel&&!sti){alert('Fyll inn tittel eller filsti');return;}
  if(!noter2[latId])noter2[latId]=[];
  noter2[latId].push({tittel,sti,kommentar});
  save();renderNoterList(latId);buildPDFList(latId);
  ['mls-new-tittel','mls-new-sti','mls-new-komm'].forEach(id=>document.getElementById(id).value='');
}
function removeNotat(latId,idx){
  if(!noter2[latId])return;
  noter2[latId].splice(idx,1);
  save();renderNoterList(latId);buildPDFList(latId);
}
function openPDFSti(sti){
  if(!sti)return;
  if(window.electronAPI) window.electronAPI.openPDF(sti);
}

async function pickPDFForNotat(){
  if(!window.electronAPI)return;
  const p = await window.electronAPI.pickPDF();
  if(p) document.getElementById('mls-new-sti').value=p;
}
async function pickPDFForModal(){
  if(!window.electronAPI)return;
  const p = await window.electronAPI.pickPDF();
  if(p) document.getElementById('ml-noter').value=p;
}
/* modal lat */
function openNyLatModal(){
  editingLatId=null;
  document.getElementById('modal-lat-title').textContent='Ny låt';
  ['ml-namn','ml-kilde','ml-noter'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ml-type').value='';
  modalInst=[];renderInstPicker();
  const d=document.getElementById('ml-drop');d.textContent='Slipp PDF her for å hente filsti';d.classList.remove('has-file','over');
  document.getElementById('modal-lat').classList.add('open');
}
function openEditLat(id){
  const lat=data.latar.find(l=>l.id===id);if(!lat)return;
  editingLatId=id;
  document.getElementById('modal-lat-title').textContent='Rediger låt';
  document.getElementById('ml-namn').value=lat.navn;
  document.getElementById('ml-type').value=lat.type;
  document.getElementById('ml-kilde').value=lat.kilde;
  const sti=noter[id]||'';document.getElementById('ml-noter').value=sti;
  modalInst=[...(lat.instrument||[])];renderInstPicker();
  const d=document.getElementById('ml-drop');
  if(sti){d.textContent=sti.split(/[/\\]/).pop()||sti;d.classList.add('has-file');}else{d.textContent='Slipp PDF her for å hente filsti';d.classList.remove('has-file');}
  document.getElementById('modal-lat').classList.add('open');
}
function saveLatModal(){
  const navn=document.getElementById('ml-namn').value.trim();if(!navn){alert('Namn er påkravd');return;}
  const type=document.getElementById('ml-type').value;
  const kilde=document.getElementById('ml-kilde').value.trim();
  const sti=document.getElementById('ml-noter').value.trim();
  if(editingLatId){const lat=data.latar.find(l=>l.id===editingLatId);if(lat){lat.navn=navn;lat.type=type;lat.kilde=kilde;lat.instrument=[...modalInst];}if(sti)noter[editingLatId]=sti;else delete noter[editingLatId];}
  else{const id=data.nextLatId++;data.latar.push({id,navn,type,kilde,instrument:[...modalInst]});if(sti)noter[id]=sti;}
  save();closeModal('modal-lat');buildFilters();renderLatar();
}

/* modal samling */
function openNySamlModal(){
  editingSamlId=null;
  document.getElementById('modal-saml-title').textContent='Ny samling';
  ['ms-namn','ms-type','ms-year'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-saml').classList.add('open');
}
function openEditSaml(id){
  const s=data.samlingar.find(x=>x.id===id);if(!s)return;
  editingSamlId=id;
  document.getElementById('modal-saml-title').textContent='Rediger samling';
  document.getElementById('ms-namn').value=s.navn;
  document.getElementById('ms-type').value=s.type;
  document.getElementById('ms-year').value=s.år;
  document.getElementById('modal-saml').classList.add('open');
}
function saveSamlModal(){
  const navn=document.getElementById('ms-namn').value.trim();if(!navn){alert('Namn er påkravd');return;}
  const type=document.getElementById('ms-type').value.trim(),år=document.getElementById('ms-year').value.trim();
  if(editingSamlId){const s=data.samlingar.find(x=>x.id===editingSamlId);if(s){s.navn=navn;s.type=type;s.år=år;}}
  else data.samlingar.push({id:data.nextSamlId++,navn,type,år});
  save();closeModal('modal-saml');buildFilters();renderSamlList();
  if(editingSamlId&&activeSamlId===editingSamlId)renderSamlDetail(editingSamlId);
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));

load().then(()=>{
  buildFilters();
  renderLatar();
  document.getElementById('header-subtitle').textContent=data.latar.length+' låtar · '+data.samlingar.length+' samlingar';
});
</script>
</body>
</html>
